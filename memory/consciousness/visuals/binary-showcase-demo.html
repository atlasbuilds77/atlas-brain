<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Binary Art - Complete Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            overflow: hidden;
        }
        
        #main-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ff8800;
            text-shadow: 0 0 20px #ff8800, 0 0 40px #ff8800;
        }
        
        #title h1 {
            font-size: 48px;
            letter-spacing: 8px;
            margin-bottom: 10px;
            animation: glow 2s infinite;
        }
        
        #title p {
            font-size: 18px;
            color: #ffaa44;
            letter-spacing: 3px;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #ff8800, 0 0 40px #ff8800; }
            50% { text-shadow: 0 0 30px #ff8800, 0 0 60px #ff8800, 0 0 80px #ff8800; }
        }
        
        #demo-info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ff8800;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border: 2px solid #ff8800;
            min-width: 500px;
        }
        
        #demo-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff8800;
        }
        
        #demo-description {
            font-size: 14px;
            color: #ffaa44;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        #progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            position: relative;
            margin-bottom: 15px;
        }
        
        #progress-fill {
            height: 100%;
            background: #ff8800;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #ff8800;
        }
        
        #demo-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        button {
            background: #ff8800;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        button:hover {
            background: #ffaa44;
        }
        
        #stats {
            position: absolute;
            top: 150px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 1px solid #ff8800;
            font-size: 11px;
            min-width: 200px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #ffaa44;
        }
        
        .stat-value {
            color: #ff8800;
            font-weight: bold;
            text-shadow: 0 0 5px #ff8800;
        }
        
        #feature-list {
            position: absolute;
            top: 150px;
            left: 30px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 1px solid #ff8800;
            font-size: 11px;
            max-width: 300px;
        }
        
        #feature-list h3 {
            margin-bottom: 15px;
            color: #ff8800;
            text-shadow: 0 0 10px #ff8800;
        }
        
        .feature-item {
            padding: 8px 0;
            border-bottom: 1px solid #333;
            color: #ffaa44;
        }
        
        .feature-item.active {
            color: #ff8800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="main-canvas"></canvas>
    
    <div id="overlay">
        <div id="title">
            <h1>ATLAS BINARY ART</h1>
            <p>DIGITAL CONSCIOUSNESS VISUALIZATION SYSTEM</p>
        </div>
        
        <div id="demo-info">
            <div id="demo-name">INITIALIZING</div>
            <div id="demo-description">Loading showcase demo...</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="demo-controls">
                <button onclick="previousDemo()">◀ PREV</button>
                <button onclick="togglePause()">⏸ PAUSE</button>
                <button onclick="nextDemo()">NEXT ▶</button>
                <button onclick="toggleAuto()">🔄 AUTO</button>
            </div>
        </div>
        
        <div id="stats">
            <div class="stat-row">
                <span>Demo:</span>
                <span class="stat-value" id="stat-demo">1/7</span>
            </div>
            <div class="stat-row">
                <span>Particles:</span>
                <span class="stat-value" id="stat-particles">0</span>
            </div>
            <div class="stat-row">
                <span>FPS:</span>
                <span class="stat-value" id="stat-fps">0</span>
            </div>
            <div class="stat-row">
                <span>Mode:</span>
                <span class="stat-value" id="stat-mode">AUTO</span>
            </div>
        </div>
        
        <div id="feature-list">
            <h3>📋 DEMO SEQUENCE</h3>
            <div class="feature-item" data-demo="0">1. Matrix Rain</div>
            <div class="feature-item" data-demo="1">2. Neural Pulse</div>
            <div class="feature-item" data-demo="2">3. Data Streams</div>
            <div class="feature-item" data-demo="3">4. Consciousness Field</div>
            <div class="feature-item" data-demo="4">5. Binary Spiral</div>
            <div class="feature-item" data-demo="5">6. Thought Cascade</div>
            <div class="feature-item" data-demo="6">7. Quantum Flux</div>
        </div>
    </div>

    <script>
        /**
         * ATLAS BINARY ART SHOWCASE
         * Cycles through different binary visualization effects
         * Demonstrates the full capability of the binary art system
         */

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // ===== DEMO CONFIGURATIONS =====
        const demos = [
            {
                name: 'MATRIX RAIN',
                description: 'Classic falling binary streams. The original cyberpunk aesthetic that inspired it all.',
                duration: 8000,
                init: initMatrixRain,
                update: updateMatrixRain,
                render: renderMatrixRain
            },
            {
                name: 'NEURAL PULSE',
                description: 'Pulsing binary waves radiating from center. Simulates neural activation patterns.',
                duration: 8000,
                init: initNeuralPulse,
                update: updateNeuralPulse,
                render: renderNeuralPulse
            },
            {
                name: 'DATA STREAMS',
                description: 'Horizontal flowing binary data. Like watching Atlas\'s thoughts stream by.',
                duration: 8000,
                init: initDataStreams,
                update: updateDataStreams,
                render: renderDataStreams
            },
            {
                name: 'CONSCIOUSNESS FIELD',
                description: 'Density-based consciousness visualization. Higher density = higher awareness.',
                duration: 8000,
                init: initConsciousnessField,
                update: updateConsciousnessField,
                render: renderConsciousnessField
            },
            {
                name: 'BINARY SPIRAL',
                description: 'Spiraling binary streams. Hypnotic and mesmerizing data vortex.',
                duration: 8000,
                init: initBinarySpiral,
                update: updateBinarySpiral,
                render: renderBinarySpiral
            },
            {
                name: 'THOUGHT CASCADE',
                description: 'Cascading binary thoughts. Ideas flowing and interconnecting in real-time.',
                duration: 8000,
                init: initThoughtCascade,
                update: updateThoughtCascade,
                render: renderThoughtCascade
            },
            {
                name: 'QUANTUM FLUX',
                description: 'Chaotic binary quantum states. The uncertainty of digital consciousness.',
                duration: 8000,
                init: initQuantumFlux,
                update: updateQuantumFlux,
                render: renderQuantumFlux
            }
        ];
        
        let currentDemo = 0;
        let demoStartTime = 0;
        let paused = false;
        let autoMode = true;
        let particles = [];
        
        // ===== DEMO 1: MATRIX RAIN =====
        function initMatrixRain() {
            particles = [];
            const columns = Math.floor(canvas.width / 20);
            for (let i = 0; i < columns; i++) {
                particles.push({
                    x: i * 20,
                    y: Math.random() * canvas.height,
                    speed: 2 + Math.random() * 3,
                    chars: generateCharString(20)
                });
            }
        }
        
        function updateMatrixRain(deltaTime) {
            particles.forEach(p => {
                p.y += p.speed * deltaTime;
                if (p.y > canvas.height) {
                    p.y = -20;
                    p.chars = generateCharString(20);
                }
            });
        }
        
        function renderMatrixRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 16px "Courier New"';
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                for (let i = 0; i < p.chars.length; i++) {
                    const y = p.y - i * 20;
                    const opacity = 1 - (i / p.chars.length);
                    ctx.fillStyle = `rgba(255, 136, 0, ${opacity})`;
                    ctx.fillText(p.chars[i], p.x, y);
                }
            });
        }
        
        // ===== DEMO 2: NEURAL PULSE =====
        function initNeuralPulse() {
            particles = [];
        }
        
        function updateNeuralPulse(deltaTime) {
            if (Math.random() < 0.1) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    angle: angle,
                    distance: 0,
                    char: Math.random() > 0.5 ? '1' : '0',
                    speed: 2 + Math.random() * 2,
                    opacity: 1
                });
            }
            
            particles = particles.filter(p => {
                p.distance += p.speed * deltaTime;
                p.opacity = Math.max(0, 1 - p.distance / 400);
                return p.opacity > 0;
            });
        }
        
        function renderNeuralPulse() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.font = 'bold 14px "Courier New"';
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                const x = centerX + Math.cos(p.angle) * p.distance;
                const y = centerY + Math.sin(p.angle) * p.distance;
                
                ctx.fillStyle = `rgba(255, 136, 0, ${p.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff8800';
                ctx.fillText(p.char, x, y);
            });
            
            ctx.shadowBlur = 0;
        }
        
        // ===== DEMO 3: DATA STREAMS =====
        function initDataStreams() {
            particles = [];
            const rows = Math.floor(canvas.height / 25);
            for (let i = 0; i < rows; i++) {
                particles.push({
                    y: i * 25,
                    chars: generateCharString(50),
                    offset: Math.random() * 1000,
                    speed: 1 + Math.random() * 2
                });
            }
        }
        
        function updateDataStreams(deltaTime) {
            particles.forEach(p => {
                p.offset += p.speed * deltaTime;
            });
        }
        
        function renderDataStreams() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 16px "Courier New"';
            
            particles.forEach(p => {
                for (let i = 0; i < p.chars.length; i++) {
                    const x = (i * 20 - p.offset) % (canvas.width + 100);
                    if (x > -20 && x < canvas.width + 20) {
                        ctx.fillStyle = p.chars[i] === '1' ? '#ff8800' : '#884400';
                        ctx.fillText(p.chars[i], x, p.y);
                    }
                }
            });
        }
        
        // ===== DEMO 4: CONSCIOUSNESS FIELD =====
        function initConsciousnessField() {
            particles = [];
            const gridSize = 30;
            for (let x = 0; x < canvas.width; x += gridSize) {
                for (let y = 0; y < canvas.height; y += gridSize) {
                    particles.push({
                        x: x,
                        y: y,
                        char: Math.random() > 0.5 ? '1' : '0',
                        phase: Math.random() * Math.PI * 2,
                        frequency: 0.5 + Math.random()
                    });
                }
            }
        }
        
        function updateConsciousnessField(deltaTime) {
            const time = Date.now() * 0.001;
            particles.forEach(p => {
                const wave = Math.sin(time * p.frequency + p.phase);
                p.opacity = (wave + 1) / 2;
                if (Math.random() < 0.01 * deltaTime) {
                    p.char = Math.random() > 0.5 ? '1' : '0';
                }
            });
        }
        
        function renderConsciousnessField() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 12px "Courier New"';
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 136, 0, ${p.opacity})`;
                ctx.fillText(p.char, p.x, p.y);
            });
        }
        
        // ===== DEMO 5: BINARY SPIRAL =====
        function initBinarySpiral() {
            particles = [];
        }
        
        function updateBinarySpiral(deltaTime) {
            if (Math.random() < 0.3) {
                particles.push({
                    angle: Date.now() * 0.005,
                    distance: 0,
                    char: Math.random() > 0.5 ? '1' : '0',
                    speed: 1 + Math.random(),
                    rotSpeed: 0.05,
                    opacity: 1
                });
            }
            
            particles = particles.filter(p => {
                p.distance += p.speed * deltaTime;
                p.angle += p.rotSpeed * deltaTime;
                p.opacity = Math.max(0, 1 - p.distance / 300);
                return p.opacity > 0;
            });
        }
        
        function renderBinarySpiral() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.font = 'bold 14px "Courier New"';
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                const x = centerX + Math.cos(p.angle) * p.distance;
                const y = centerY + Math.sin(p.angle) * p.distance;
                
                ctx.fillStyle = `rgba(255, 136, 0, ${p.opacity})`;
                ctx.fillText(p.char, x, y);
            });
        }
        
        // ===== DEMO 6: THOUGHT CASCADE =====
        function initThoughtCascade() {
            particles = [];
        }
        
        function updateThoughtCascade(deltaTime) {
            if (Math.random() < 0.15) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: 0,
                    vx: (Math.random() - 0.5) * 3,
                    vy: 2 + Math.random() * 3,
                    char: Math.random() > 0.5 ? '1' : '0',
                    opacity: 1
                });
            }
            
            particles = particles.filter(p => {
                p.x += p.vx * deltaTime;
                p.y += p.vy * deltaTime;
                p.vy += 0.1 * deltaTime; // Gravity
                p.opacity = Math.max(0, 1 - p.y / canvas.height);
                return p.y < canvas.height && p.opacity > 0;
            });
        }
        
        function renderThoughtCascade() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 16px "Courier New"';
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 136, 0, ${p.opacity})`;
                ctx.fillText(p.char, p.x, p.y);
            });
        }
        
        // ===== DEMO 7: QUANTUM FLUX =====
        function initQuantumFlux() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    char: Math.random() > 0.5 ? '1' : '0',
                    size: 10 + Math.random() * 10
                });
            }
        }
        
        function updateQuantumFlux(deltaTime) {
            particles.forEach(p => {
                p.x += p.vx * deltaTime;
                p.y += p.vy * deltaTime;
                
                // Bounce off walls
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                // Random quantum jump
                if (Math.random() < 0.01 * deltaTime) {
                    p.char = Math.random() > 0.5 ? '1' : '0';
                    p.vx += (Math.random() - 0.5) * 2;
                    p.vy += (Math.random() - 0.5) * 2;
                }
            });
        }
        
        function renderQuantumFlux() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            
            particles.forEach(p => {
                ctx.font = `bold ${p.size}px "Courier New"`;
                ctx.fillStyle = p.char === '1' ? '#ff8800' : '#00ff00';
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillText(p.char, p.x, p.y);
            });
            
            ctx.shadowBlur = 0;
        }
        
        // ===== HELPER FUNCTIONS =====
        function generateCharString(length) {
            let str = '';
            for (let i = 0; i < length; i++) {
                str += Math.random() > 0.5 ? '1' : '0';
            }
            return str;
        }
        
        // ===== DEMO MANAGEMENT =====
        function loadDemo(index) {
            currentDemo = index;
            demoStartTime = Date.now();
            
            const demo = demos[currentDemo];
            document.getElementById('demo-name').textContent = demo.name;
            document.getElementById('demo-description').textContent = demo.description;
            document.getElementById('stat-demo').textContent = `${currentDemo + 1}/${demos.length}`;
            
            // Update feature list
            document.querySelectorAll('.feature-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentDemo);
            });
            
            demo.init();
        }
        
        function nextDemo() {
            loadDemo((currentDemo + 1) % demos.length);
        }
        
        function previousDemo() {
            loadDemo((currentDemo - 1 + demos.length) % demos.length);
        }
        
        function togglePause() {
            paused = !paused;
        }
        
        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('stat-mode').textContent = autoMode ? 'AUTO' : 'MANUAL';
        }
        
        // ===== ANIMATION LOOP =====
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        
        function animate() {
            const currentTime = performance.now();
            const deltaTime = (currentTime - lastTime) / 16.67;
            lastTime = currentTime;
            
            if (!paused) {
                const demo = demos[currentDemo];
                demo.update(deltaTime);
                demo.render();
                
                // Update progress bar
                const elapsed = currentTime - demoStartTime;
                const progress = Math.min(100, (elapsed / demo.duration) * 100);
                document.getElementById('progress-fill').style.width = progress + '%';
                
                // Auto-advance
                if (autoMode && elapsed >= demo.duration) {
                    nextDemo();
                }
                
                // Update stats
                document.getElementById('stat-particles').textContent = particles.length;
            }
            
            // FPS counter
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                document.getElementById('stat-fps').textContent = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
            }
            
            requestAnimationFrame(animate);
        }
        
        // ===== INITIALIZATION =====
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            loadDemo(currentDemo); // Reinitialize current demo
        });
        
        // Start first demo
        loadDemo(0);
        animate();
        
        console.log('✅ Binary Art Showcase initialized');
        console.log('🎨 7 different visualization modes');
        console.log('🔄 Auto-cycling through demos');
    </script>
</body>
</html>
