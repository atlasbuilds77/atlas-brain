<!DOCTYPE html>
<html>
<head>
    <title>Atlas Brain - Simple Working Version</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        #info {
            position: absolute; top: 20px; left: 20px;
            color: #ff8800; font-family: monospace;
            background: rgba(0,0,0,0.8); padding: 15px;
            border: 2px solid #ff8800;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>⚡ ATLAS BRAIN</h3>
        <div>FPS: <span id="fps">60</span></div>
        <div>Nodes: <span id="nodes">76</span></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        document.body.appendChild(renderer.domElement);
        
        camera.position.z = 8;
        
        const light = new THREE.AmbientLight(0xff8800, 0.5);
        scene.add(light);
        
        const brainGroup = new THREE.Group();
        scene.add(brainGroup);
        
        // Simple brain geometry
        const brainGeo = new THREE.SphereGeometry(2.5, 32, 32);
        const brainMat = new THREE.MeshBasicMaterial({
            color: 0xff8800,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const brainMesh = new THREE.Mesh(brainGeo, brainMat);
        brainGroup.add(brainMesh);
        
        // Add colored nodes
        const colors = [0x00ffff, 0x0099ff, 0xffff00, 0xaa00ff, 0xff8800, 0xff5500, 0x00ff88, 0xff66bb];
        for (let i = 0; i < 76; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const r = 2.5;
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            
            const nodeGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const nodeMat = new THREE.MeshBasicMaterial({ 
                color: colors[i % colors.length],
                transparent: true,
                opacity: 0.8
            });
            const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
            nodeMesh.position.set(x, y, z);
            brainGroup.add(nodeMesh);
        }
        
        let lastTime = Date.now();
        function animate() {
            requestAnimationFrame(animate);
            
            brainGroup.rotation.y += 0.002;
            
            const now = Date.now();
            const fps = Math.round(1000 / (now - lastTime));
            lastTime = now;
            document.getElementById('fps').textContent = fps;
            
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
