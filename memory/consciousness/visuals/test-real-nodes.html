<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Brain - Real Nodes Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #canvas {
            display: block;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
            font-size: 14px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
        
        button {
            background: #0077ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 14px;
        }
        
        button:hover {
            background: #0055cc;
        }
        
        #node-counts {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .highlight {
            color: #00ffff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        
        <div id="info">
            <h3>Atlas Brain - Real Nodes</h3>
            <p>Visualizing actual memory files as brain nodes:</p>
            <div class="legend">
                <div class="legend-item">
                    <div class="color-box" style="background: #00ffff;"></div>
                    <span>Protocols (Front Left)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background: #0077ff;"></div>
                    <span>Trading (Front Right)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background: #ffff00;"></div>
                    <span>People (Temporal)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background: #aa00ff;"></div>
                    <span>Tools (Motor Cortex)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background: #ff8800;"></div>
                    <span>Cognitive Systems</span>
                </div>
            </div>
            <div id="node-counts">
                Loading node counts...
            </div>
        </div>
        
        <div id="controls">
            <p>Controls: Drag to rotate, Scroll to zoom</p>
            <div>
                <button id="rescan">Rescan Now</button>
                <button id="resetView">Reset View</button>
            </div>
            <p style="margin-top: 10px; font-size: 12px; opacity: 0.8;">
                Auto-rescan every 10 seconds for new memory files
            </p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/controls/OrbitControls.js';
        
        // Import our real nodes module
        import { loadRealNodes, watchForNewNodes, updateNodeAnimations, getNodeCounts } from './real-brain-nodes.js';
        
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        
        // Brain hemisphere visualization
        function createBrainHemisphere(color, isLeft = true) {
            const geometry = new THREE.SphereGeometry(3, 32, 32, 0, Math.PI * 2, 0, Math.PI);
            const material = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.1,
                side: THREE.DoubleSide
            });
            const hemisphere = new THREE.Mesh(geometry, material);
            hemisphere.position.x = isLeft ? -1.5 : 1.5;
            hemisphere.position.y = 1;
            return hemisphere;
        }
        
        const leftHemisphere = createBrainHemisphere(0x00aaff, true);
        const rightHemisphere = createBrainHemisphere(0x0077ff, false);
        scene.add(leftHemisphere);
        scene.add(rightHemisphere);
        
        // Node storage
        let nodes = [];
        const nodeMeshes = new Map();
        
        // Create node mesh
        function createNodeMesh(node) {
            const geometry = new THREE.SphereGeometry(1, 16, 16);
            const material = new THREE.MeshPhongMaterial({
                color: node.color,
                transparent: true,
                opacity: node.opacity || 1,
                emissive: node.color,
                emissiveIntensity: 0.2
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.scale.setScalar(node.scale || 0.2);
            mesh.position.set(node.position.x, node.position.y, node.position.z);
            
            // Add glow effect
            const glowGeometry = new THREE.SphereGeometry(1.2, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: node.color,
                transparent: true,
                opacity: 0.3,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.scale.setScalar(1);
            mesh.add(glow);
            
            // Store node data on mesh
            mesh.userData = { nodeId: node.id, node };
            
            return mesh;
        }
        
        // Load initial nodes
        async function loadNodes() {
            nodes = await loadRealNodes();
            
            // Clear existing meshes
            nodeMeshes.forEach(mesh => scene.remove(mesh));
            nodeMeshes.clear();
            
            // Create meshes for each node
            nodes.forEach(node => {
                const mesh = createNodeMesh(node);
                scene.add(mesh);
                nodeMeshes.set(node.id, mesh);
            });
            
            updateNodeCounts();
        }
        
        // Update node counts display
        function updateNodeCounts() {
            const counts = getNodeCounts();
            document.getElementById('node-counts').innerHTML = `
                <div>Total Nodes: <span class="highlight">${counts.total}</span></div>
                <div>Protocols: <span class="highlight">${counts.protocols}</span></div>
                <div>Trading: <span class="highlight">${counts.trading}</span></div>
                <div>People: <span class="highlight">${counts.people}</span></div>
                <div>Tools: <span class="highlight">${counts.tools}</span></div>
                <div>Cognitive: <span class="highlight">${counts.cognitive}</span></div>
            `;
        }
        
        // Handle new nodes
        function handleNewNodes(newNodes) {
            console.log(`Adding ${newNodes.length} new nodes`);
            
            newNodes.forEach(node => {
                if (!nodeMeshes.has(node.id)) {
                    const mesh = createNodeMesh(node);
                    scene.add(mesh);
                    nodeMeshes.set(node.id, mesh);
                    nodes.push(node);
                }
            });
            
            updateNodeCounts();
        }
        
        // Start watching for new nodes
        let stopWatching = watchForNewNodes(handleNewNodes, 10000);
        
        // Animation loop
        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);
            
            const deltaTime = (time - lastTime) / 1000;
            lastTime = time;
            
            // Update node animations
            updateNodeAnimations(nodes, deltaTime);
            
            // Update meshes
            nodes.forEach(node => {
                const mesh = nodeMeshes.get(node.id);
                if (mesh) {
                    // Update position with gentle floating
                    mesh.position.y = node.position.y;
                    
                    // Update scale with pulse
                    mesh.scale.setScalar(node.scale);
                    
                    // Update opacity
                    mesh.material.opacity = node.opacity;
                    mesh.children[0].material.opacity = node.opacity * 0.3;
                    
                    // Rotate slowly
                    mesh.rotation.y += 0.01;
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Start animation
        animate(0);
        
        // Load initial nodes
        loadNodes();
        
        // Event listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('rescan').addEventListener('click', () => {
            loadNodes();
        });
        
        document.getElementById('resetView').addEventListener('click', () => {
            controls.reset();
            camera.position.set(0, 0, 10);
            controls.update();
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stopWatching) {
                stopWatching();
            }
        });
    </script>
</body>
</html>
