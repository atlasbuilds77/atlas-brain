# =====================================================
# KRONOS CI/CD PIPELINE - GITHUB ACTIONS
# =====================================================

name: Kronos CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com

jobs:
  # =====================
  # Backend Tests
  # =====================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kronos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run linting
        working-directory: ./backend
        run: |
          ruff check .
          ruff format --check .
      
      - name: Run type checking
        working-directory: ./backend
        run: mypy app --ignore-missing-imports
      
      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/kronos_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend

  # =====================
  # Frontend Tests
  # =====================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run linting
        working-directory: ./frontend
        run: npm run lint
      
      - name: Run type checking
        working-directory: ./frontend
        run: npm run type-check
      
      - name: Run tests
        working-directory: ./frontend
        run: npm run test -- --coverage
      
      - name: Build
        working-directory: ./frontend
        run: npm run build

  # =====================
  # Security Scanning
  # =====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # =====================
  # Build & Push Images
  # =====================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
      worker-image: ${{ steps.build-worker.outputs.image }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push backend image
        id: build-backend
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/kronos/backend:$IMAGE_TAG \
            -f deployment/docker/Dockerfile.backend \
            --target production \
            ./backend
          docker push $ECR_REGISTRY/kronos/backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/kronos/backend:$IMAGE_TAG $ECR_REGISTRY/kronos/backend:latest
          docker push $ECR_REGISTRY/kronos/backend:latest
          echo "image=$ECR_REGISTRY/kronos/backend:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push frontend image
        id: build-frontend
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/kronos/frontend:$IMAGE_TAG \
            -f deployment/docker/Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            ./frontend
          docker push $ECR_REGISTRY/kronos/frontend:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/kronos/frontend:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Build and push worker image
        id: build-worker
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/kronos/worker:$IMAGE_TAG \
            -f deployment/docker/Dockerfile.worker \
            ./backend
          docker push $ECR_REGISTRY/kronos/worker:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/kronos/worker:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # =====================
  # Deploy to Staging
  # =====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.kronos.app
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to ECS
        run: |
          # Update ECS services with new images
          aws ecs update-service \
            --cluster kronos-staging \
            --service kronos-backend \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster kronos-staging \
            --service kronos-frontend \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster kronos-staging \
            --service kronos-worker \
            --force-new-deployment
      
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster kronos-staging \
            --services kronos-backend kronos-frontend
      
      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh https://staging.kronos.app
      
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Kronos deployed to staging: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =====================
  # Deploy to Production
  # =====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.kronos.app
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Create deployment record
        run: |
          echo "Creating deployment record..."
          echo "SHA: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Store deployment info in S3 for rollback reference
          cat > deployment.json << EOF
          {
            "sha": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "backend_image": "${{ needs.build.outputs.backend-image }}",
            "frontend_image": "${{ needs.build.outputs.frontend-image }}",
            "worker_image": "${{ needs.build.outputs.worker-image }}"
          }
          EOF
          
          aws s3 cp deployment.json s3://kronos-deployments/production/$(date +%Y%m%d-%H%M%S).json
          aws s3 cp deployment.json s3://kronos-deployments/production/latest.json
      
      - name: Deploy backend (blue-green)
        run: |
          # Use CodeDeploy for blue-green deployment
          aws deploy create-deployment \
            --application-name kronos-production \
            --deployment-group-name kronos-backend \
            --revision '{"revisionType":"S3","s3Location":{"bucket":"kronos-deployments","key":"production/latest.json","bundleType":"JSON"}}'
      
      - name: Deploy frontend
        run: |
          aws ecs update-service \
            --cluster kronos-production \
            --service kronos-frontend \
            --force-new-deployment
      
      - name: Deploy worker
        run: |
          aws ecs update-service \
            --cluster kronos-production \
            --service kronos-worker \
            --force-new-deployment
      
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster kronos-production \
            --services kronos-backend kronos-frontend
      
      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh https://app.kronos.app
      
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: kronos
          SENTRY_PROJECT: kronos
        with:
          environment: production
          version: ${{ github.sha }}
      
      - name: Notify team
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Kronos deployed to PRODUCTION: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =====================
  # Rollback Job
  # =====================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    environment: production
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get previous deployment
        id: prev-deploy
        run: |
          # Get second-to-last deployment
          PREV=$(aws s3 ls s3://kronos-deployments/production/ | sort | tail -2 | head -1 | awk '{print $4}')
          aws s3 cp s3://kronos-deployments/production/$PREV prev-deployment.json
          echo "file=prev-deployment.json" >> $GITHUB_OUTPUT
      
      - name: Rollback services
        run: |
          BACKEND_IMAGE=$(jq -r '.backend_image' prev-deployment.json)
          FRONTEND_IMAGE=$(jq -r '.frontend_image' prev-deployment.json)
          WORKER_IMAGE=$(jq -r '.worker_image' prev-deployment.json)
          
          echo "Rolling back to:"
          echo "  Backend: $BACKEND_IMAGE"
          echo "  Frontend: $FRONTEND_IMAGE"
          echo "  Worker: $WORKER_IMAGE"
          
          # Update task definitions with previous images and deploy
          # (Implementation depends on your task definition management)
      
      - name: Notify team of rollback
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Kronos ROLLBACK initiated for production"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
