# Kronos Local Development Stack
# Usage: docker-compose up -d

version: '3.9'

services:
  # ===================
  # PostgreSQL Database
  # ===================
  db:
    image: postgres:15-alpine
    container_name: kronos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kronos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kronos_dev_password}
      POSTGRES_DB: ${DB_NAME:-kronos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kronos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kronos-network

  # ===================
  # Redis Cache & Queue
  # ===================
  redis:
    image: redis:7-alpine
    container_name: kronos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-kronos_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-kronos_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kronos-network

  # ===================
  # Backend API
  # ===================
  backend:
    build:
      context: ../backend
      dockerfile: ../deployment/docker/Dockerfile.backend
      target: development
    container_name: kronos-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-kronos}:${DB_PASSWORD:-kronos_dev_password}@db:5432/${DB_NAME:-kronos}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-kronos_redis_dev}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-kronos_redis_dev}@redis:6379/1
    volumes:
      - ../backend:/app
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kronos-network

  # ===================
  # Celery Worker
  # ===================
  worker:
    build:
      context: ../backend
      dockerfile: ../deployment/docker/Dockerfile.worker
    container_name: kronos-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-kronos}:${DB_PASSWORD:-kronos_dev_password}@db:5432/${DB_NAME:-kronos}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-kronos_redis_dev}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-kronos_redis_dev}@redis:6379/1
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kronos-network

  # ===================
  # Celery Beat (Scheduler)
  # ===================
  scheduler:
    build:
      context: ../backend
      dockerfile: ../deployment/docker/Dockerfile.worker
    container_name: kronos-scheduler
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-kronos}:${DB_PASSWORD:-kronos_dev_password}@db:5432/${DB_NAME:-kronos}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-kronos_redis_dev}@redis:6379/1
    depends_on:
      - worker
    networks:
      - kronos-network

  # ===================
  # Frontend
  # ===================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: kronos-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - kronos-network

  # ===================
  # Nginx Reverse Proxy
  # ===================
  nginx:
    image: nginx:alpine
    container_name: kronos-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - kronos-network

  # ===================
  # MinIO (S3-compatible storage)
  # ===================
  minio:
    image: minio/minio
    container_name: kronos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-kronos_minio_dev}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-kronos_minio_secret_dev}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kronos-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_logs:

networks:
  kronos-network:
    driver: bridge
